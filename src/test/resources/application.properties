spring.application.name=menufacil-test

# MongoDB embedded (n?o depende de localhost:27017)
spring.mongodb.embedded.version=7.0.12

# Desabilita cria??o de ?ndices no startup durante testes de contexto
menufacil.mongo.create-indexes=false

# Cloudinary test defaults
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
